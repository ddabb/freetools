<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机版汉字头像器</title>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            color: #333;
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        
        header {
            text-align: center;
            padding: 15px 0;
        }
        
        h1 {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 0.95rem;
        }
        
        .input-section {
            background: white;
            border-radius: 16px;
            padding: 22px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            color: #2c3e50;
            font-size: 1.05rem;
        }
        
        .text-input {
            width: 100%;
            padding: 16px 18px;
            border: 2px solid #e0e6ed;
            border-radius: 12px;
            font-size: 1.2rem;
            transition: all 0.3s;
            text-align: center;
        }
        
        .text-input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        }
        
        .hint {
            font-size: 0.85rem;
            color: #95a5a6;
            margin-top: 8px;
            text-align: center;
        }
        
        .templates-section {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        
        .templates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 10px;
        }
        
        .template-option {
            position: relative;
        }
        
        .template-radio {
            display: none;
        }
        
        .template-label {
            display: block;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            background: #f8f9fa;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .template-radio:checked + .template-label {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }
        
        .template-name {
            font-weight: 500;
            margin-bottom: 5px;
            color: #2c3e50;
            font-size: 0.95rem;
        }
        
        .template-desc {
            font-size: 0.8rem;
            color: #7f8c8d;
            line-height: 1.4;
        }
        
        .text-effect-section {
            margin-top: 10px;
        }
        
        .text-effect-options {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        
        .text-effect-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        
        .text-effect-radio {
            display: none;
        }
        
        .text-effect-label {
            width: 100%;
            padding: 12px 8px;
            border-radius: 10px;
            background: #f8f9fa;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            font-size: 0.9rem;
        }
        
        .text-effect-radio:checked + .text-effect-label {
            border-color: #3498db;
            background: rgba(52, 152, 219, 0.05);
        }
        
        .text-effect-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid #e0e6ed;
        }
        
        .preview-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }
        
        .preview-title {
            font-weight: 500;
            margin-bottom: 20px;
            color: #2c3e50;
            font-size: 1.1rem;
        }
        
        #avatar-preview {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: bold;
            margin: 0 auto 25px;
            transition: all 0.3s;
            overflow: hidden;
            user-select: none;
        }
        
        .preview-info {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-align: center;
            margin-top: 10px;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            width: 100%;
        }
        
        .btn {
            flex: 1;
            padding: 18px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        
        .btn-primary:hover, .btn-primary:active {
            background: linear-gradient(135deg, #2980b9, #2573a7);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(41, 128, 185, 0.4);
        }
        
        .btn-secondary {
            background: #f8f9fa;
            color: #2c3e50;
            border: 2px solid #e0e6ed;
        }
        
        .btn-secondary:hover, .btn-secondary:active {
            background: #e9ecef;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .btn-icon {
            font-size: 1.2rem;
        }
        
        footer {
            text-align: center;
            margin-top: 20px;
            color: #95a5a6;
            font-size: 0.85rem;
            padding: 20px 0;
        }
        
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .loading.show {
            display: flex;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .emoji-notice {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #856404;
        }
        
        .template-preview {
            width: 24px;
            height: 24px;
            border-radius: 4px;
            margin: 0 auto 8px;
            border: 1px solid #e0e6ed;
        }
        
        .quality-notice {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #0c5460;
        }
        
        @media (min-width: 600px) {
            .templates-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }
        
        @media (max-width: 400px) {
            .templates-grid {
                grid-template-columns: 1fr;
            }
            
            .text-effect-options {
                grid-template-columns: repeat(2, 1fr);
            }
            
            #avatar-preview {
                width: 180px;
                height: 180px;
                font-size: 4rem;
            }
            
            .btn {
                padding: 16px 15px;
                font-size: 1rem;
            }
            
            .template-label {
                min-height: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>汉字头像器</h1>
            <p class="subtitle">输入1-4个汉字或1个emoji，选择模板，生成专属头像</p>
        </header>
        
        <section class="input-section">
            <div class="input-group">
                <label for="text-input">输入汉字或emoji</label>
                <input type="text" id="text-input" class="text-input" placeholder="输入1-4个汉字或1个emoji" maxlength="4" value="元宝">
                <p class="hint">注意：一个emoji视为一个汉字，最多只能输入一个emoji</p>
                <div class="emoji-notice" id="emoji-notice" style="display: none;">
                    <strong>检测到emoji输入：</strong> 将使用纯色背景，文字效果不适用
                </div>
            </div>
            
            <div class="templates-section">
                <div class="input-group">
                    <label>选择头像模板（共9种）</label>
                    <div class="templates-grid">
                        <!-- 模板1：简约圆形 -->
                        <div class="template-option">
                            <input type="radio" id="template1" name="template" class="template-radio" value="template1" checked>
                            <label for="template1" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #3498db, #8e44ad); border-radius: 50%;"></div>
                                <div class="template-name">简约圆形</div>
                                <div class="template-desc">简洁大方，适合多种场景</div>
                            </label>
                        </div>
                        
                        <!-- 模板2：方形边框 -->
                        <div class="template-option">
                            <input type="radio" id="template2" name="template" class="template-radio" value="template2">
                            <label for="template2" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #2ecc71, #1abc9c); border-radius: 6px; border: 3px solid #2c3e50;"></div>
                                <div class="template-name">方形边框</div>
                                <div class="template-desc">带边框设计，突出内容</div>
                            </label>
                        </div>
                        
                        <!-- 模板3：渐变背景 -->
                        <div class="template-option">
                            <input type="radio" id="template3" name="template" class="template-radio" value="template3">
                            <label for="template3" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4); border-radius: 50%;"></div>
                                <div class="template-name">渐变背景</div>
                                <div class="template-desc">多彩渐变，活泼生动</div>
                            </label>
                        </div>
                        
                        <!-- 模板4：阴影效果 -->
                        <div class="template-option">
                            <input type="radio" id="template4" name="template" class="template-radio" value="template4">
                            <label for="template4" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #e74c3c, #c0392b); border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.3);"></div>
                                <div class="template-name">阴影效果</div>
                                <div class="template-desc">立体阴影，层次分明</div>
                            </label>
                        </div>
                        
                        <!-- 模板5：金色质感 -->
                        <div class="template-option">
                            <input type="radio" id="template5" name="template" class="template-radio" value="template5">
                            <label for="template5" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #FFD700, #FFA500); border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.2);"></div>
                                <div class="template-name">金色质感</div>
                                <div class="template-desc">金色渐变，高端大气</div>
                            </label>
                        </div>
                        
                        <!-- 模板6：科技蓝 -->
                        <div class="template-option">
                            <input type="radio" id="template6" name="template" class="template-radio" value="template6">
                            <label for="template6" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #00b4db, #0083b0); border-radius: 20px;"></div>
                                <div class="template-name">科技蓝</div>
                                <div class="template-desc">科技感蓝色，专业稳重</div>
                            </label>
                        </div>
                        
                        <!-- 模板7：粉色浪漫 -->
                        <div class="template-option">
                            <input type="radio" id="template7" name="template" class="template-radio" value="template7">
                            <label for="template7" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #ff6b9d, #ff8e53); border-radius: 50%;"></div>
                                <div class="template-name">粉色浪漫</div>
                                <div class="template-desc">粉色系渐变，温柔浪漫</div>
                            </label>
                        </div>
                        
                        <!-- 模板8：商务深灰 -->
                        <div class="template-option">
                            <input type="radio" id="template8" name="template" class="template-radio" value="template8">
                            <label for="template8" class="template-label">
                                <div class="template-preview" style="background: linear-gradient(135deg, #485563, #29323c); border-radius: 8px; color: white;"></div>
                                <div class="template-name">商务深灰</div>
                                <div class="template-desc">深灰渐变，商务风格</div>
                            </label>
                        </div>
                        
                        <!-- 模板9：纯色背景（专为emoji设计） -->
                        <div class="template-option">
                            <input type="radio" id="template9" name="template" class="template-radio" value="template9">
                            <label for="template9" class="template-label">
                                <div class="template-preview" style="background: #ffffff; border: 2px solid #2c3e50; border-radius: 50%;"></div>
                                <div class="template-name">纯色背景</div>
                                <div class="template-desc">适合emoji，简洁纯粹</div>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="input-group text-effect-section">
                    <label>选择文字艺术效果（非emoji专用）</label>
                    <div class="text-effect-options">
                        <!-- 文字效果1：普通 -->
                        <div class="text-effect-option">
                            <input type="radio" id="textEffect1" name="textEffect" class="text-effect-radio" value="normal" checked>
                            <label for="textEffect1" class="text-effect-label">
                                <div class="text-effect-preview" style="background: #f5f5f5; color: #000000; text-shadow: none; font-weight: bold;">文</div>
                                <div>普通效果</div>
                            </label>
                        </div>
                        
                        <!-- 文字效果2：渐变文字 -->
                        <div class="text-effect-option">
                            <input type="radio" id="textEffect2" name="textEffect" class="text-effect-radio" value="gradient">
                            <label for="textEffect2" class="text-effect-label">
                                <div class="text-effect-preview" style="background: #f5f5f5; background: linear-gradient(45deg, #f3ec78, #af4261); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: bold;">文</div>
                                <div>渐变文字</div>
                            </label>
                        </div>
                        
                        <!-- 文字效果3：阴影效果 -->
                        <div class="text-effect-option">
                            <input type="radio" id="textEffect3" name="textEffect" class="text-effect-radio" value="shadow">
                            <label for="textEffect3" class="text-effect-label">
                                <div class="text-effect-preview" style="background: #f5f5f5; color: #000000; text-shadow: 4px 4px 8px rgba(0,0,0,0.5); font-weight: bold;">文</div>
                                <div>阴影效果</div>
                            </label>
                        </div>
                        
                        <!-- 文字效果4：描边效果 -->
                        <div class="text-effect-option">
                            <input type="radio" id="textEffect4" name="textEffect" class="text-effect-radio" value="stroke">
                            <label for="textEffect4" class="text-effect-label">
                                <div class="text-effect-preview" style="background: #f5f5f5; color: #ffffff; -webkit-text-stroke: 2px #2c3e50; text-stroke: 2px #2c3e50; font-weight: bold;">文</div>
                                <div>描边效果</div>
                            </label>
                        </div>
                        
                        <!-- 文字效果5：发光效果 -->
                        <div class="text-effect-option">
                            <input type="radio" id="textEffect5" name="textEffect" class="text-effect-radio" value="glow">
                            <label for="textEffect5" class="text-effect-label">
                                <div class="text-effect-preview" style="background: #2c3e50; color: #ffffff; text-shadow: 0 0 10px #00ff9d, 0 0 20px #00ff9d; font-weight: bold;">文</div>
                                <div>发光效果</div>
                            </label>
                        </div>
                        
                        <!-- 文字效果6：立体效果 -->
                        <div class="text-effect-option">
                            <input type="radio" id="textEffect6" name="textEffect" class="text-effect-radio" value="3d">
                            <label for="textEffect6" class="text-effect-label">
                                <div class="text-effect-preview" style="background: #f5f5f5; color: #000000; text-shadow: 2px 2px 0 #2c3e50, 4px 4px 0 rgba(0,0,0,0.2); font-weight: bold;">文</div>
                                <div>立体效果</div>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div class="quality-notice">
                    <strong>图片质量提示：</strong> 导出PNG图片分辨率为800×800像素，确保高清质量。深色背景搭配浅色文字，浅色背景搭配深色文字，以获得最佳视觉效果。
                </div>
            </div>
        </section>
        
        <section class="preview-section">
            <div class="preview-title">预览效果</div>
            <div id="avatar-preview">元宝</div>
            <p class="preview-info">预览将实时更新，导出图片为800×800像素高清PNG</p>
            
            <div class="actions">
                <button id="reset-btn" class="btn btn-secondary">
                    <span class="btn-icon">↺</span> 重置
                </button>
                <button id="export-btn" class="btn btn-primary">
                    <span class="btn-icon">⤓</span> 导出PNG
                </button>
            </div>
        </section>
        
        <footer>
            <p>©  汉字头像器 | 支持1-4个汉字或1个emoji | 9种背景模板 | 6种文字效果</p>
        </footer>
    </div>
    
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>正在生成高清图片，请稍候...</p>
    </div>

    <script>
        // DOM元素
        const textInput = document.getElementById('text-input');
        const avatarPreview = document.getElementById('avatar-preview');
        const templateRadios = document.querySelectorAll('.template-radio');
        const textEffectRadios = document.querySelectorAll('.text-effect-radio');
        const resetBtn = document.getElementById('reset-btn');
        const exportBtn = document.getElementById('export-btn');
        const loadingOverlay = document.getElementById('loading');
        const emojiNotice = document.getElementById('emoji-notice');
        
        // 模板配置
        const templates = {
            template1: {
                name: '简约圆形',
                isDark: true,
                style: {
                    background: 'linear-gradient(135deg, #3498db, #8e44ad)',
                    borderRadius: '50%',
                    boxShadow: '0 10px 25px rgba(0, 0, 0, 0.2)',
                    fontSize: '4.5rem',
                    color: '#ffffff',
                    border: 'none',
                    textShadow: 'none'
                }
            },
            template2: {
                name: '方形边框',
                isDark: true,
                style: {
                    background: 'linear-gradient(135deg, #2ecc71, #1abc9c)',
                    borderRadius: '25px',
                    boxShadow: '0 10px 25px rgba(0, 0, 0, 0.2)',
                    border: '8px solid #2c3e50',
                    fontSize: '4rem',
                    color: '#ffffff',
                    textShadow: 'none'
                }
            },
            template3: {
                name: '渐变背景',
                isDark: false,
                style: {
                    background: 'linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4)',
                    borderRadius: '50%',
                    boxShadow: '0 10px 25px rgba(0, 0, 0, 0.2)',
                    fontSize: '4.5rem',
                    color: '#000000',
                    border: 'none',
                    textShadow: 'none'
                }
            },
            template4: {
                name: '阴影效果',
                isDark: true,
                style: {
                    background: 'linear-gradient(135deg, #e74c3c, #c0392b)',
                    borderRadius: '50%',
                    boxShadow: '0 20px 40px rgba(0, 0, 0, 0.3), inset 0 10px 20px rgba(255, 255, 255, 0.2)',
                    fontSize: '4.5rem',
                    color: '#ffffff',
                    border: 'none',
                    textShadow: '2px 4px 6px rgba(0, 0, 0, 0.3)'
                }
            },
            template5: {
                name: '金色质感',
                isDark: true,
                style: {
                    background: 'linear-gradient(135deg, #FFD700, #FFA500)',
                    borderRadius: '50%',
                    boxShadow: '0 15px 35px rgba(255, 165, 0, 0.4), inset 0 5px 15px rgba(255, 255, 255, 0.4)',
                    fontSize: '4.5rem',
                    color: '#ffffff',
                    border: 'none',
                    textShadow: '2px 2px 4px rgba(0, 0, 0, 0.3)'
                }
            },
            template6: {
                name: '科技蓝',
                isDark: true,
                style: {
                    background: 'linear-gradient(135deg, #00b4db, #0083b0)',
                    borderRadius: '20px',
                    boxShadow: '0 10px 20px rgba(0, 131, 176, 0.3)',
                    fontSize: '4.5rem',
                    color: '#ffffff',
                    border: 'none',
                    textShadow: '1px 2px 3px rgba(0, 0, 0, 0.2)'
                }
            },
            template7: {
                name: '粉色浪漫',
                isDark: true,
                style: {
                    background: 'linear-gradient(135deg, #ff6b9d, #ff8e53)',
                    borderRadius: '50%',
                    boxShadow: '0 10px 25px rgba(255, 107, 157, 0.3)',
                    fontSize: '4.5rem',
                    color: '#ffffff',
                    border: 'none',
                    textShadow: '1px 2px 3px rgba(0, 0, 0, 0.2)'
                }
            },
            template8: {
                name: '商务深灰',
                isDark: true,
                style: {
                    background: 'linear-gradient(135deg, #485563, #29323c)',
                    borderRadius: '8px',
                    boxShadow: '0 10px 20px rgba(0, 0, 0, 0.3)',
                    fontSize: '4.5rem',
                    color: '#ffffff',
                    border: '3px solid #1a1a1a',
                    textShadow: '1px 2px 3px rgba(0, 0, 0, 0.4)'
                }
            },
            template9: {
                name: '纯色背景',
                isDark: false,
                style: {
                    background: '#ffffff',
                    borderRadius: '50%',
                    boxShadow: '0 10px 25px rgba(0, 0, 0, 0.1)',
                    fontSize: '4.5rem',
                    color: '#000000',
                    border: 'none',
                    textShadow: 'none'
                }
            }
        };
        
        // 文字效果配置
        const textEffects = {
            normal: {
                name: '普通效果',
                style: {
                    textShadow: 'none',
                    WebkitTextStroke: 'none',
                    textStroke: 'none',
                    backgroundImage: 'none',
                    WebkitBackgroundClip: 'none',
                    WebkitTextFillColor: 'currentColor',
                    backgroundClip: 'none'
                }
            },
            gradient: {
                name: '渐变文字',
                style: {
                    textShadow: 'none',
                    WebkitTextStroke: 'none',
                    textStroke: 'none',
                    backgroundImage: 'linear-gradient(45deg, #f3ec78, #af4261)',
                    WebkitBackgroundClip: 'text',
                    WebkitTextFillColor: 'transparent',
                    backgroundClip: 'text'
                }
            },
            shadow: {
                name: '阴影效果',
                style: {
                    textShadow: '4px 4px 8px rgba(0, 0, 0, 0.5)',
                    WebkitTextStroke: 'none',
                    textStroke: 'none',
                    backgroundImage: 'none',
                    WebkitBackgroundClip: 'none',
                    WebkitTextFillColor: 'currentColor',
                    backgroundClip: 'none'
                }
            },
            stroke: {
                name: '描边效果',
                style: {
                    textShadow: 'none',
                    WebkitTextStroke: '2px #2c3e50',
                    textStroke: '2px #2c3e50',
                    backgroundImage: 'none',
                    WebkitBackgroundClip: 'none',
                    WebkitTextFillColor: 'currentColor',
                    backgroundClip: 'none'
                }
            },
            glow: {
                name: '发光效果',
                style: {
                    textShadow: '0 0 10px #00ff9d, 0 0 20px #00ff9d',
                    WebkitTextStroke: 'none',
                    textStroke: 'none',
                    backgroundImage: 'none',
                    WebkitBackgroundClip: 'none',
                    WebkitTextFillColor: 'currentColor',
                    backgroundClip: 'none'
                }
            },
            '3d': {
                name: '立体效果',
                style: {
                    textShadow: '2px 2px 0 #2c3e50, 4px 4px 0 rgba(0, 0, 0, 0.2)',
                    WebkitTextStroke: 'none',
                    textStroke: 'none',
                    backgroundImage: 'none',
                    WebkitBackgroundClip: 'none',
                    WebkitTextFillColor: 'currentColor',
                    backgroundClip: 'none'
                }
            }
        };
        
        // 检查输入是否有效（1-4个汉字或1个emoji）
        function isValidInput(input) {
            if (!input || input.trim() === '') {
                return { valid: false, message: '请输入内容' };
            }
            
            // 将输入转换为数组以正确处理emoji
            const chars = Array.from(input.trim());
            const charCount = chars.length;
            
            // 检查是否包含emoji
            const emojiRegex = /\p{Emoji}/u;
            const hasEmoji = chars.some(char => emojiRegex.test(char));
            const emojiCount = chars.filter(char => emojiRegex.test(char)).length;
            
            // 规则验证
            if (hasEmoji) {
                if (charCount > 1) {
                    return { 
                        valid: false, 
                        message: '只能输入一个emoji，或1-4个汉字',
                        isEmoji: false
                    };
                }
                
                if (emojiCount !== 1) {
                    return { 
                        valid: false, 
                        message: '只能输入一个emoji',
                        isEmoji: false
                    };
                }
                
                return { 
                    valid: true, 
                    message: '',
                    isEmoji: true
                };
            }
            
            if (charCount > 4) {
                return { 
                    valid: false, 
                    message: '最多只能输入4个字符',
                    isEmoji: false
                };
            }
            
            return { valid: true, message: '', isEmoji: false };
        }
        
        // 更新预览
        function updatePreview() {
            const inputValue = textInput.value.trim();
            const validation = isValidInput(inputValue);
            
            // 显示或隐藏emoji提示
            if (validation.valid && validation.isEmoji) {
                emojiNotice.style.display = 'block';
            } else {
                emojiNotice.style.display = 'none';
            }
            
            // 获取选中的模板
            let selectedTemplate = 'template1';
            templateRadios.forEach(radio => {
                if (radio.checked) {
                    selectedTemplate = radio.value;
                }
            });
            
            // 获取选中的文字效果
            let selectedTextEffect = 'normal';
            textEffectRadios.forEach(radio => {
                if (radio.checked) {
                    selectedTextEffect = radio.value;
                }
            });
            
            const template = templates[selectedTemplate];
            const textEffect = textEffects[selectedTextEffect];
            
            // 重置所有样式
            avatarPreview.style = '';
            
            // 应用模板样式
            Object.keys(template.style).forEach(key => {
                avatarPreview.style[key] = template.style[key];
            });
            
            // 如果是emoji，强制使用纯色背景模板，不应用文字效果
            if (validation.valid && validation.isEmoji) {
                // 使用纯色背景模板
                const solidTemplate = templates.template9;
                Object.keys(solidTemplate.style).forEach(key => {
                    avatarPreview.style[key] = solidTemplate.style[key];
                });
                
                // 自动选中纯色背景模板
                document.getElementById('template9').checked = true;
                
                // 不应用任何文字效果
                avatarPreview.textContent = inputValue || '预览';
                exportBtn.disabled = false;
                
                // 根据emoji大小调整字体大小
                avatarPreview.style.fontSize = '6rem';
            } else {
                // 设置文字内容
                if (!validation.valid) {
                    avatarPreview.textContent = '预览';
                    avatarPreview.style.background = '#95a5a6';
                    avatarPreview.style.color = '#ffffff';
                    exportBtn.disabled = true;
                } else {
                    avatarPreview.textContent = inputValue || '预览';
                    exportBtn.disabled = false;
                    
                    // 根据字符数量调整字体大小
                    const charCount = Array.from(inputValue).length;
                    if (charCount === 1) {
                        avatarPreview.style.fontSize = template.style.fontSize;
                    } else if (charCount === 2) {
                        avatarPreview.style.fontSize = '4rem';
                    } else if (charCount === 3) {
                        avatarPreview.style.fontSize = '3.5rem';
                    } else if (charCount === 4) {
                        avatarPreview.style.fontSize = '3rem';
                    }
                    
                    // 应用文字效果（非emoji时）
                    Object.keys(textEffect.style).forEach(key => {
                        avatarPreview.style[key] = textEffect.style[key];
                    });
                    
                    // 普通效果时，根据背景深浅自动调整文字颜色
                    if (selectedTextEffect === 'normal') {
                        if (template.isDark) {
                            avatarPreview.style.color = '#ffffff'; // 深色背景用白色文字
                        } else {
                            avatarPreview.style.color = '#000000'; // 浅色背景用黑色文字
                        }
                    }
                }
            }
        }
        
        // 导出PNG图片
        async function exportAsPNG() {
            const inputValue = textInput.value.trim();
            const validation = isValidInput(inputValue);
            
            if (!validation.valid) {
                alert(`输入无效: ${validation.message}`);
                return;
            }
            
            loadingOverlay.classList.add('show');
            
            try {
                // 添加临时的高分辨率处理
                const originalWidth = avatarPreview.offsetWidth;
                const originalHeight = avatarPreview.offsetHeight;
                const originalFontSize = getComputedStyle(avatarPreview).fontSize;
                const scale = 3; // 提高导出图片的分辨率，生成800x800像素图片
                
                // 临时设置高分辨率
                avatarPreview.style.width = `${originalWidth * scale}px`;
                avatarPreview.style.height = `${originalHeight * scale}px`;
                avatarPreview.style.fontSize = `${parseFloat(originalFontSize) * scale}px`;
                avatarPreview.style.lineHeight = `${originalHeight * scale}px`;
                
                // 使用html2canvas生成图片
                const canvas = await html2canvas(avatarPreview, {
                    backgroundColor: null,
                    scale: 2, // 提高画布缩放
                    useCORS: true,
                    logging: false,
                    width: originalWidth * scale,
                    height: originalHeight * scale
                });
                
                // 恢复原始尺寸
                avatarPreview.style.width = `${originalWidth}px`;
                avatarPreview.style.height = `${originalHeight}px`;
                avatarPreview.style.fontSize = originalFontSize;
                avatarPreview.style.lineHeight = '';
                
                // 创建下载链接
                const link = document.createElement('a');
                link.download = `汉字头像_${inputValue}_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
            } catch (error) {
                console.error('导出图片时出错:', error);
                alert('导出图片失败，请重试');
            } finally {
                loadingOverlay.classList.remove('show');
            }
        }
        
        // 重置表单
        function resetForm() {
            textInput.value = '元宝';
            document.getElementById('template1').checked = true;
            document.getElementById('textEffect1').checked = true;
            updatePreview();
        }
        
        // 事件监听
        textInput.addEventListener('input', updatePreview);
        
        templateRadios.forEach(radio => {
            radio.addEventListener('change', updatePreview);
        });
        
        textEffectRadios.forEach(radio => {
            radio.addEventListener('change', updatePreview);
        });
        
        resetBtn.addEventListener('click', resetForm);
        exportBtn.addEventListener('click', exportAsPNG);
        
        // 初始化
        updatePreview();
        
        // 添加触摸事件支持
        document.addEventListener('touchstart', function() {}, {passive: false});
        
        // 测试用例
        console.log("=== 测试用例 ===");
        
        // 测试1: 验证输入验证函数
        console.log("测试1 - 输入验证:");
        console.log("空输入:", isValidInput(""));
        console.log("1个汉字:", isValidInput("汉"));
        console.log("4个汉字:", isValidInput("汉字头像器"));
        console.log("1个emoji:", isValidInput("😊"));
        console.log("2个字符含emoji:",isValidInput("😊汉"));
        console.log("5个汉字:", isValidInput("汉字头像器"));
        
        // 测试2: 模拟用户交互
        console.log("\n测试2 - 模拟用户交互:");
        
        // 测试输入变化
        textInput.value = "测试";
        updatePreview();
        console.log("设置为'测试'，预览已更新");
        
        // 测试普通效果颜色
        textInput.value = "汉字";
        document.getElementById('template3').checked = true;
        updatePreview();
        console.log("设置为浅色背景模板+普通效果，应显示黑色文字");
        
        // 测试深色背景普通效果
        document.getElementById('template1').checked = true;
        updatePreview();
        console.log("设置为深色背景模板+普通效果，应显示白色文字");
        
        // 测试emoji输入
        textInput.value = "🚀";
        updatePreview();
        console.log("设置为emoji'🚀'，自动切换到纯色背景模板，预览已更新");
        
        // 恢复初始状态
        resetForm();
        console.log("重置表单，恢复初始状态");
    </script>
</body>
</html>
