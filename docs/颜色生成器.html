<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=375, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机端颜色选择器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .phone-frame {
            width: 375px;
            height: 812px;
            background-color: #fff;
            border-radius: 40px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            margin-bottom: 20px;
        }

        .status-icons {
            display: flex;
            gap: 5px;
        }

        .icon {
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 50%;
        }

        .close-btn {
            width: 24px;
            height: 24px;
            background-color: #666;
            border-radius: 50%;
            position: relative;
        }

        .close-btn::before,
        .close-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 12px;
            height: 2px;
            background-color: #fff;
        }

        .close-btn::before {
            transform: translate(-50%, -50%) rotate(45deg);
        }

        .close-btn::after {
            transform: translate(-50%, -50%) rotate(-45deg);
        }

        /* 颜色信息栏 */
        .color-info {
            background-color: #eee;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .color-code {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .copy-btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background-color 0.3s;
        }

        .copy-btn:hover {
            background-color: #0056b3;
        }

        /* RGB调节区 */
        .rgb-section {
            background-color: #fff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .rgb-row {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .rgb-label {
            width: 30px;
            font-weight: bold;
        }

        .slider-container {
            flex-grow: 1;
            margin: 0 10px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, red, green, blue);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background-color: #007bff;
            border-radius: 50%;
            cursor: pointer;
        }

        .rgb-value {
            width: 50px;
            text-align: center;
            border: 1px solid #ddd;
            padding: 5px;
            border-radius: 4px;
        }

        /* 随机颜色按钮 */
        .random-btn {
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background-color 0.3s;
        }

        .random-btn:hover {
            background-color: #45a049;
        }

        /* 颜色面板 */
        .color-panel {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .color-block {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .color-block:hover {
            transform: scale(1.05);
        }

        /* 最近使用区 */
        .recent-section {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
        }

        .recent-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .recent-block {
            background-color: #dcdcdc;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <!-- 顶部状态栏 -->
        <div class="status-bar">
            <div class="status-icons">
                <div class="icon"></div>
                <div class="icon"></div>
                <div class="icon"></div>
            </div>
            <div class="close-btn"></div>
        </div>

        <!-- 颜色信息栏 -->
        <div class="color-info">
            <div class="color-code">#000000</div>
            <button class="copy-btn">复制</button>
        </div>

        <!-- RGB调节区 -->
        <div class="rgb-section">
            <div class="rgb-row">
                <div class="rgb-label">R</div>
                <div class="slider-container">
                    <input type="range" min="0" max="255" value="0" id="r-slider">
                </div>
                <div class="rgb-value" id="r-value">0</div>
            </div>
            <div class="rgb-row">
                <div class="rgb-label">G</div>
                <div class="slider-container">
                    <input type="range" min="0" max="255" value="0" id="g-slider">
                </div>
                <div class="rgb-value" id="g-value">0</div>
            </div>
            <div class="rgb-row">
                <div class="rgb-label">B</div>
                <div class="slider-container">
                    <input type="range" min="0" max="255" value="0" id="b-slider">
                </div>
                <div class="rgb-value" id="b-value">0</div>
            </div>
        </div>

        <!-- 随机颜色按钮 -->
        <button class="random-btn">随机颜色</button>

        <!-- 颜色面板 -->
        <div class="color-panel">
            <!-- 基础颜色块 -->
            <div class="color-block" style="background-color: red;"></div>
            <div class="color-block" style="background-color: lime;"></div>
            <div class="color-block" style="background-color: blue;"></div>
            <div class="color-block" style="background-color: yellow;"></div>
            <div class="color-block" style="background-color: magenta;"></div>
            <div class="color-block" style="background-color: cyan;"></div>
            <div class="color-block" style="background-color: orange;"></div>
            <div class="color-block" style="background-color: purple;"></div>
            <div class="color-block" style="background-color: green;"></div>
            <div class="color-block" style="background-color: navy;"></div>
            <div class="color-block" style="background-color: maroon;"></div>
            <div class="color-block" style="background-color: olive;"></div>
            <div class="color-block" style="background-color: pink;"></div>
            <div class="color-block" style="background-color: gold;"></div>
            <div class="color-block" style="background-color: tomato;"></div>
            <div class="color-block" style="background-color: violet;"></div>
            <div class="color-block" style="background-color: salmon;"></div>
            <div class="color-block" style="background-color: teal;"></div>
        </div>

        <!-- 最近使用区 -->
        <div>
            <div class="recent-title">最近使用</div>
            <div class="recent-section">
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
                <div class="recent-block"></div>
            </div>
        </div>
    </div>

    <script>
        // 获取DOM元素
        const rSlider = document.getElementById('r-slider');
        const gSlider = document.getElementById('g-slider');
        const bSlider = document.getElementById('b-slider');
        const rValue = document.getElementById('r-value');
        const gValue = document.getElementById('g-value');
        const bValue = document.getElementById('b-value');
        const colorCode = document.querySelector('.color-code');
        const copyBtn = document.querySelector('.copy-btn');
        const colorBlocks = document.querySelectorAll('.color-block');

        // 更新颜色显示
        function updateColor() {
            const r = rSlider.value;
            const g = gSlider.value;
            const b = bSlider.value;
            const hex = `#${r.toString(16).padStart(2, '0')}${g.toString(16).padStart(2, '0')}${b.toString(16).padStart(2, '0')}`;
            
            colorCode.textContent = hex;
            document.body.style.backgroundColor = hex;
        }

        // 滑块事件监听
        [rSlider, gSlider, bSlider].forEach(slider => {
            slider.addEventListener('input', updateColor);
        });

        // 初始化颜色
        updateColor();

        // 复制颜色代码
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(colorCode.textContent)
                .then(() => alert('颜色已复制！'))
                .catch(err => console.error('复制失败:', err));
        });

        // 随机颜色生成
        document.querySelector('.random-btn').addEventListener('click', () => {
            rSlider.value = Math.floor(Math.random() * 256);
            gSlider.value = Math.floor(Math.random() * 256);
            bSlider.value = Math.floor(Math.random() * 256);
            updateColor();
        });

        // 颜色块点击事件
        colorBlocks.forEach(block => {
            block.addEventListener('click', () => {
                const color = getComputedStyle(block).backgroundColor;
                const hex = rgbToHex(color);
                const [r, g, b] = hex.match(/.{2}/g).map(Number);
                
                rSlider.value = r;
                gSlider.value = g;
                bSlider.value = b;
                updateColor();
            });
        });

        // RGB转十六进制
        function rgbToHex(rgb) {
            return rgb.match(/\d+/g).map(val => (val | 0).toString(16).padStart(2, '0')).join('');
        }
    </script>
</body>
</html>
