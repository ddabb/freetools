<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- 首页图标 - 房子 -->
  <defs>
    <style>
      .icon-home { fill: currentColor; }
    </style>
  </defs>
  
  <!-- 屋顶 -->
  <polygon points="128,32 32,112 48,112 48,200 208,200 208,112 224,112" class="icon-home" opacity="0.8"/>
  
  <!-- 房子主体 -->
  <rect x="64" y="120" width="128" height="80" rx="8" class="icon-home" opacity="0.6"/>
  
  <!-- 门 -->
  <rect x="104" y="160" width="48" height="60" rx="4" class="icon-home" opacity="0.4"/>
  
  <!-- 门把手 -->
  <circle cx="144" cy="190" r="4" class="icon-home" opacity="0.8"/>
  
  <!-- 窗户 -->
  <rect x="72" y="136" width="32" height="32" rx="4" class="icon-home" opacity="0.4"/>
  <line x1="88" y1="136" x2="88" y2="168" class="icon-home" opacity="0.6" stroke-width="2"/>
  <line x1="72" y1="152" x2="104" y2="152" class="icon-home" opacity="0.6" stroke-width="2"/>
  
  <rect x="152" y="136" width="32" height="32" rx="4" class="icon-home" opacity="0.4"/>
  <line x1="168" y1="136" x2="168" y2="168" class="icon-home" opacity="0.6" stroke-width="2"/>
  <line x1="152" y1="152" x2="184" y2="152" class="icon-home" opacity="0.6" stroke-width="2"/>
</svg>
